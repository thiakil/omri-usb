[versions]
kotlin = "2.4.0"
#logback = "1.5.35"
log4j2 = "2.26.1"
#jni helper
jenny = "1.3.0-patch"

[libraries]
#logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
log4j-api = { group = "org.apache.logging.log4j", name = "log4j-api", version.ref = "log4j2" }
log4j-core = { group = "org.apache.logging.log4j", name = "log4j-core", version.ref = "log4j2" }
log4j-slf4j-impl = { group = "org.apache.logging.log4j", name = "log4j-slf4j2-impl", version.ref = "log4j2" }
jenny-annotation = { group = "io.github.landerlyoung", name = "jenny-annotation", version.ref = "jenny" }
jenny-compiler = { group = "io.github.landerlyoung", name = "jenny-compiler", version.ref = "jenny" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
