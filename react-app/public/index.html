<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will

    <title>React App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>

      hudiy = {
        colorScheme: {
          primaryPaletteKeyColor: "rgb(62 95 144)",
          secondaryPaletteKeyColor: "rgb(85 95 113)",
          tertiaryPaletteKeyColor: "rgb(110 86 118)",
          neutralPaletteKeyColor: "#909094",
          neutralVariantPaletteKeyColor: "#8E9199",
          background: "rgb(249 249 255)",
          onBackground: "rgb(25 28 32)",
          surface: "rgb(249 249 255)",
          surfaceDim: "rgb(217 218 224)",
          surfaceBright: "rgb(249 249 255)",
          surfaceContainerLowest: "rgb(255 255 255)",
          surfaceContainerLow: "rgb(243 243 250)",
          surfaceContainer: "rgb(237 237 244)",
          surfaceContainerHigh: "rgb(231 232 238)",
          surfaceContainerHighest: "rgb(225 226 233)",
          onSurface: "rgb(25 28 32)",
          surfaceVariant: "rgb(224 226 236)",
          onSurfaceVariant: "rgb(67 71 78)",
          inverseSurface: "rgb(46 48 53)",
          inverseOnSurface: "rgb(240 240 247)",
          outline: "rgb(116 119 127)",
          outlineVariant: "rgb(196 198 207)",
          shadow: "rgb(0 0 0)",
          scrim: "rgb(0 0 0)",
          surfaceTint: "rgb(62 95 144)",
          primary: "rgb(62 95 144)",
          onPrimary: "rgb(255 255 255)",
          primaryContainer: "rgb(213 227 255)",
          onPrimaryContainer: "rgb(36 71 119)",
          inversePrimary: "rgb(167 200 255)",
          secondary: "rgb(85 95 113)",
          onSecondary: "rgb(255 255 255)",
          secondaryContainer: "rgb(217 227 248)",
          onSecondaryContainer: "rgb(61 71 88)",
          tertiary: "rgb(110 86 118)",
          onTertiary: "rgb(255 255 255)",
          tertiaryContainer: "rgb(248 216 254)",
          onTertiaryContainer: "rgb(86 62 93)",
          error: "rgb(186 26 26)",
          onError: "rgb(255 255 255)",
          errorContainer: "rgb(255 218 214)",
          onErrorContainer: "rgb(147 0 10)",
          primaryFixed: "rgb(213 227 255)",
          primaryFixedDim: "rgb(167 200 255)",
          onPrimaryFixed: "rgb(0 27 60)",
          onPrimaryFixedVariant: "rgb(36 71 119)",
          secondaryFixed: "rgb(217 227 248)",
          secondaryFixedDim: "rgb(189 199 220)",
          onSecondaryFixed: "rgb(18 28 43)",
          onSecondaryFixedVariant: "rgb(61 71 88)",
          tertiaryFixed: "rgb(248 216 254)",
          tertiaryFixedDim: "rgb(219 188 225)",
          onTertiaryFixed: "rgb(39 19 47)",
          onTertiaryFixedVariant: "rgb(86 62 93)",
        }
      }

      function updateColors() {
        for (let color of hudiy.colorScheme) {
          document.body.style.setProperty(`--hudiy-${color}`, hudiy.colorScheme[color]);
        }
      }

      hudiy.onInputFocusChanged = function() {
        console.error("onInputFocusChanged " + hudiy.inputFocus)
      }

      hudiy.onActivatedChanged = function() {
        console.error("onActivatedChanged " + hudiy.activated)
      }

      hudiy.onMoveToNextControl = function() {
        console.error("onMoveToNextControl")
      }

      hudiy.onMoveToPreviousControl = function() {
        console.error("onMoveToPreviousControl")
      }

      hudiy.onTriggered = function() {
        console.error("onTriggered")
      }

      hudiy.onGoLeft = function() {
        console.error("onGoLeft")
      }

      hudiy.onGoRight = function() {
        console.error("onGoRight")
      }

      hudiy.onGoBack = function() {
        console.error("onGoBack")
        return false;
      }

      hudiy.onAttached = function() {
        console.error("onAttached")
        hudiy.onInputFocusChanged();
        updateColors()
      }

      hudiy.onColorSchemeChanged = function() {
        console.error("onColorSchemeChanged")
        updateColors()
      }
    </script>
    <!--
      This HTML file is a template.

      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
