apply plugin: 'com.android.library'

// change to true if you want Address Sanitizer active in debug build
// see https://developer.android.com/ndk/guides/asan
def asanEnabledInDebugBuild = false

// allow for project-level definition of certain versions. If such does not exist, use defaults.
// -- compileSdk
def omriUsbCompileSdkVersion
if (rootProject.hasProperty('ext.compileSdkVersion') && rootProject.ext.compileSdkVersion) {
    omriUsbCompileSdkVersion = rootProject.ext.compileSdkVersion
} else {
    omriUsbCompileSdkVersion = 33
}
// -- ndk
def omriUsbNdkVersion
if (rootProject.hasProperty('ndkVersion') && rootProject.ext.ndkVersion) {
    omriUsbNdkVersion = rootProject.ext.ndkVersion
} else {
    omriUsbNdkVersion = "25.1.8937393"
}
// -- NDK clangVersion (must match with what ndk provides!)
def omriUsbClangVersion
if (rootProject.hasProperty('clangVersion') && rootProject.ext.clangVersion) {
    omriUsbClangVersion = rootProject.ext.clangVersion
} else {
    omriUsbClangVersion = "14.0.6"
}
// -- minSdk
def omriUsbMinSdkVersion
if (rootProject.hasProperty('minSdkVersion') && rootProject.ext.minSdkVersion) {
    omriUsbMinSdkVersion = rootProject.ext.minSdkVersion
} else {
    omriUsbMinSdkVersion = 23
}
// -- targetSdk
def omriUsbTargetSdkVersion
if (rootProject.hasProperty('targetSdkVersion') && rootProject.ext.targetSdkVersion) {
    omriUsbTargetSdkVersion = rootProject.ext.targetSdkVersion
} else {
    omriUsbTargetSdkVersion = 31
}
println("omri-usb:targetSdk:" + omriUsbTargetSdkVersion
        + ", compileSdk:" + omriUsbCompileSdkVersion
        + ", minSdkVersion:" + omriUsbMinSdkVersion
        + ", ndkVersion:" + omriUsbNdkVersion
        + ", clangVersion:" + omriUsbClangVersion)

android {

    compileSdkVersion omriUsbCompileSdkVersion
    ndkVersion omriUsbNdkVersion

    defaultConfig {
        minSdkVersion omriUsbMinSdkVersion
        //noinspection OldTargetApi
        targetSdkVersion omriUsbTargetSdkVersion
        versionCode 2
        versionName "1.0"
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++11 -frtti -fexceptions"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }
    buildTypes {
        release {
            jniDebuggable false
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            externalNativeBuild {
                cmake {
                }
            }
        }
        debug {
            jniDebuggable true
            externalNativeBuild {
                cmake {
                    // address sanitizer arguments for cmake
                    if (asanEnabledInDebugBuild) {
                        arguments "-DANDROID_ARM_MODE=arm", "-DANDROID_STL=c++_shared"
                        arguments += "-DIRTDAB_ADDRESS_SANITIZER=yes"
                    }
                }
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
        }
    }
    packagingOptions {
        jniLibs {
            // Some older Android devices with Android 6 require legacy packaging of native .so
            // files (found with libfec.so). Found necessary with minSdkVersion 23
            useLegacyPackaging true
        }
    }
    testOptions {
        unitTests {
            returnDefaultValues = true
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
//    implementation 'de.irt.hradio:dabaudiodecoderplugininterface:1.0.0'
    implementation project(path: ':dabaudiodecoderplugininterface')
    //noinspection GradleDependency  // do not want to update
    implementation 'com.google.android.exoplayer:exoplayer-core:2.7.3'
    implementation 'androidx.annotation:annotation:1.6.0'
    def minidnsVersion = '1.0.4'
    implementation 'org.minidns:minidns-core:' + minidnsVersion
    implementation 'org.minidns:minidns-hla:' + minidnsVersion
    implementation 'org.minidns:minidns-android21:' + minidnsVersion
    implementation 'net.ser1:gozirra-client:0.4.1'

//    implementation 'eu.hradio.core:radiodns:1.1.2'
//    implementation 'eu.hradio.core:platformsearch:1.0.3'

    // unit testing with JUnit and Mockito
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.1.1'
}

// Copy libclang_rt.asan-*.so files from NDK folder to jniLibs folder
// currently for arm64 only
task copyNativeAsanLibs(type: Copy) {
    outputs.file(new File(project(':omriusb').projectDir,
            '/src/main/jniLibs/arm64-v8a/libclang_rt.asan-aarch64-android.so'))
    if (asanEnabledInDebugBuild) {
        def ndkDir = project.android.ndkDirectory.absolutePath
        if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
            from(new File(ndkDir, 'toolchains/llvm/prebuilt/windows-x86_64/lib64/clang/' + omriUsbClangVersion + '/lib/linux'))
                    { include 'libclang_rt.asan-aarch64-android.so' }
            into new File(project(':omriusb').projectDir, '/src/main/jniLibs/arm64-v8a')
        } else if (org.gradle.internal.os.OperatingSystem.current().isLinux()) {
            from(new File(ndkDir, 'toolchains/llvm/prebuilt/linux-x86_64/lib64/clang/' + omriUsbClangVersion + '/lib/linux'))
                    { include 'libclang_rt.asan-aarch64-android.so' }
            into new File(project(':omriusb').projectDir, '/src/main/jniLibs/arm64-v8a')
        } else {
            // bad luck
        }
    }
}
task cleanNativeAsanLibs() {
    doLast {
        delete(file('/src/main/jniLibs/arm64-v8a/libclang_rt.asan-aarch64-android.so'))
    }
}
// Whenever the code is compiled, also copy the native libs to the build folder
tasks.withType(JavaCompile) { compileTask -> compileTask.dependsOn copyNativeAsanLibs }
// On "gradle clean" also reverse the copying of the native libraries
clean.dependsOn cleanNativeAsanLibs

// Create asan.sh in resources
// See https://developer.android.com/ndk/guides/asan
task createWrapSh(type: Copy) {
    def ndkDir = project.android.ndkDirectory.absolutePath
    outputs.file(new File(projectDir, 'src/main/resources/lib/arm64-v8a/asan.sh'))
    if (asanEnabledInDebugBuild) {
        File resourcesFolder = new File(projectDir, '/src/main/resources/lib/arm64-v8a')
        if (!resourcesFolder.exists()) {
            resourcesFolder.mkdirs()
        }
        from new File(ndkDir, '/wrap.sh/asan.sh')
        into new File(resourcesFolder, '.')
    }
}
// clean wrap.sh in resources
task cleanWrapSh() {
    doLast {
        delete(file('/src/main/resources/lib/arm64-v8a/asan.sh'))
    }
}
// When the code is compiled, also create wrap.sh
tasks.withType(JavaCompile) { compileTask -> compileTask.dependsOn createWrapSh }
// On "gradle clean" also delete wrap.sh
clean.dependsOn cleanWrapSh
